<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080,height=1920">
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <style>
    @font-face{font-family:"PingFang SC";src:local("PingFang SC")}
    *{box-sizing:border-box}html,body{margin:0;width:1080px;height:1920px;overflow:hidden;background:#05090f;font-family:"PingFang SC",sans-serif;color:#fff}
    #root{position:relative;width:1080px;height:1920px;overflow:hidden}
    .clip{position:absolute}.source{inset:0;width:100%;height:100%;object-fit:cover}
    .shade{inset:0;background:linear-gradient(180deg,rgba(3,8,14,.44),transparent 20%,transparent 70%,rgba(3,8,14,.68));pointer-events:none}
    .tag{left:54px;top:118px;padding:16px 24px;border:2px solid rgba(95,210,230,.75);border-radius:18px;background:#031019;font-size:30px;font-weight:800;letter-spacing:.08em;box-shadow:0 0 32px rgba(0,169,205,.28);text-shadow:0 2px 4px #000}
    .rail{left:54px;top:430px;width:206px;display:flex;flex-direction:column;gap:18px}
    .step{height:104px;padding:17px 20px;border-left:5px solid #00A9CD;background:#06131e;border-radius:0 18px 18px 0}
    .step b{display:block;font-size:34px;line-height:1}.step span{display:block;margin-top:10px;color:#f1f7fb;font-size:23px}
    .payoff{left:54px;right:54px;bottom:128px;min-height:164px;padding:28px 34px;border:2px solid rgba(95,210,230,.72);border-radius:28px;background:linear-gradient(135deg,rgba(2,22,32,.92),rgba(7,14,25,.92));box-shadow:0 18px 58px rgba(0,0,0,.42),0 0 38px rgba(0,169,205,.2)}
    .payoff small{display:block;color:#8deeff;font-size:25px;font-weight:760;letter-spacing:.08em}.payoff strong{display:block;margin-top:8px;font-size:46px;line-height:1.18}.accent{color:#8DEEFF}
  </style>
</head>
<body><div id="root" data-composition-id="main" data-width="1080" data-height="1920" data-start="0" data-duration="8">
  <video id="source" class="clip source" data-start="0" data-duration="8" data-track-index="0" data-media-start="0" src="assets/source.mp4" muted playsinline></video>
  <div id="shade" class="clip shade" data-start="0" data-duration="8" data-track-index="1"></div>
  <div id="tag" class="clip tag" data-start="0" data-duration="8" data-track-index="2">关键时刻 · 谁能托底</div>
  <div id="rail" class="clip rail" data-start="0" data-duration="8" data-track-index="3">
    <div class="step"><b>朋友</b><span>五千以内</span></div>
    <div class="step"><b>亲人</b><span>仍有条件</span></div>
    <div class="step"><b class="accent">保险</b><span>按合同兑现</span></div>
  </div>
  <div id="payoff" class="clip payoff" data-start="5.1" data-duration="2.9" data-track-index="4">
    <small>生死存亡时刻</small><strong>确定性，才是真正的<span class="accent">托底</span></strong>
  </div>
</div>
<script>
  window.__timelines=window.__timelines||{};
  const tl=gsap.timeline({paused:true});
  tl.from("#tag",{x:-44,opacity:0,duration:.38,ease:"power3.out"},0)
    .from("#rail .step",{x:-48,opacity:0,stagger:.09,duration:.42,ease:"power3.out"},.12)
    .from("#payoff",{y:48,opacity:0,scale:.97,duration:.48,ease:"power3.out"},5.1);
  window.__timelines.main=tl;
</script></body></html>
